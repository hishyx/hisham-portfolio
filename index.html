<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Instant redirect (browser-level) -->
    <meta http-equiv="refresh" content="0; url=https://hishyx.github.io/dev">

    <title>Redirecting...</title>

    <script>
        // Break out of iframes
        if (window.top !== window.self) {
            window.top.location = "https://hishyx.github.io/dev";
        }

        // Primary redirect (no back)
        window.location.replace("https://hishyx.github.io/dev");

        // Redundant fallback
        window.location.href = "https://hishyx.github.io/dev";
    </script>
</head>

<body>
    <script>
        // Final fallback
        location.assign("https://hishyx.github.io/dev");
    </script>
</body>
</html>
